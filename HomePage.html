<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Trang Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            /* Dùng Flexbox để tự động căn giữa mọi thứ */
            display: flex;
            flex-direction: column;
            align-items: center; 
            margin-top: 60px; /* Cách lề trên một khoảng */
            gap: 12px; /* Khoảng cách giữa các khối */
        }

        .link-block {
            background-color: white;
            color: #333;
            text-decoration: none;
            padding: 10px 25px; /* Giảm độ dày của khối */
            min-width: 220px; /* Chiều rộng cố định vừa phải */
            border-radius: 6px; /* Bo góc nhỏ hơn */
            border: 1px solid #ccc;
            font-size: 15px; /* Cỡ chữ vừa nhìn */
            text-align: center;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* Thêm bóng đổ rất nhẹ để khối nổi lên */
        }

        .link-block:hover {
            background-color: #e4e6eb;
            border-color: #bbb;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Bóng đậm hơn chút khi di chuột vào */
        }
    </style>
</head>
<body>

    <a href="bookstore.html" class="link-block">Dự án Bookstore</a>
    
    <a href="chatbot.html" class="link-block">Chatbot Toán Học</a>
    
    <a href="floodwiz.html" class="link-block">Nghiên cứu FLOODWIZ</a>
    
    <a href="trang-khac.html" class="link-block">Tên trang khác...</a>

</body>
</html>
